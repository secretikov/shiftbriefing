name: Build iOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Package IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild clean build \
            -project ShiftPlanner.xcodeproj \
            -scheme ShiftPlanner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="${{ github.workspace }}/build"

      - name: Package IPA
        run: |
          mkdir -p Payload
          mv ${{ github.workspace }}/build/ShiftPlanner.app Payload/
          zip -r ShiftPlanner.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShiftPlanner
          path: ShiftPlanner.ipa
